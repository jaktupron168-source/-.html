<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING ลีค 👑 V1</title>
    <style>
        /* ตั้งค่าพื้นหลังและโครงสร้างหลัก */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #b30000, #000000); 
            font-family: 'Tahoma', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* กล่องพาแนลกึ่งกลางจอ */
        .panel-container {
            width: 380px;
            background: rgba(25, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        h2 { 
            color: #ffffff; 
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 25px;
            font-size: 28px;
            letter-spacing: 2px;
        }

        /* ส่วนกรอก Key */
        .input-group { margin-bottom: 15px; }
        
        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ff0000;
            background: #100000;
            color: white;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 16px;
        }

        input:focus { box-shadow: 0 0 12px #ff0000; }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #ff0000, #800000);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-login:hover { transform: scale(1.02); box-shadow: 0 0 20px #ff0000; }

        /* ส่วนเมนู */
        #menu-section { display: none; }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: rgba(255, 0, 0, 0.05);
            margin-bottom: 10px;
            border-radius: 12px;
            border-left: 5px solid #ff0000;
        }

        .menu-item span { font-size: 18px; font-weight: bold; }

        /* สวิตช์เปิด-ปิด */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }

        input:checked + .slider { background-color: #ff0000; }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider:before { transform: translateX(22px); }

        /* เครดิตด้านล่างสุด */
        .credit {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        .credit b { color: #ff0000; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="panel-container">
        <h2>KING ลีค 👑 V1</h2>

        <div id="login-section">
            <div class="input-group">
                <input type="text" id="access-key" placeholder="กรอกรหัสผ่าน (KEY)">
            </div>
            <button class="btn-login" onclick="checkLogin()">LOGIN</button>
        </div>

        <div id="menu-section">
            <div class="menu-item"><span>ดูดตัว</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="menu-item"><span>จอไว</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="menu-item"><span>ขยายระยะสโคป</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="menu-item"><span>กันดำ</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="menu-item"><span>กันแบน</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        </div>

        <div class="credit">
            เครดิตผู้สร้าง : <b>king_rooster002</b>
        </div>
    </div>

    <script>
        function checkLogin() {
            const key = document.getElementById('access-key').value;

            // ตรวจสอบคีย์ที่ตั้งไว้
            if (key === "KING-League-V1") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('menu-section').style.display = 'block';
            } else {
                alert("คีย์ไม่ถูกต้อง! กรุณาลองใหม่อีกครั้ง");
            }
        }
    </script>

</body>
</html>
